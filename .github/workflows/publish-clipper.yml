name: Publish Browser Extension

# Runs on the PUBLIC repo (GeminiLight/MindOS) only.
# Triggered by clipper-v* tags synced from dev repo.
on:
  push:
    tags:
      - 'clipper-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. clipper-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @mindos/browser-extension run build

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#clipper-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./packages/browser-extension/extension/manifest.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: manifest.json=${MANIFEST_VERSION}, tag=${TAG_VERSION}"
            echo "::error::Update packages/browser-extension/src/manifest.json before tagging."
            exit 1
          fi

      - name: Package zip
        run: node packages/browser-extension/scripts/package-extension.mjs mindos-web-clipper-${{ steps.version.outputs.version }}.zip

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Collect commit messages since last clipper tag
          PREV_TAG=$(git tag --list 'clipper-v*' --sort=-v:refname | grep -v "clipper-v${VERSION}" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate -- packages/browser-extension/ | head -20)
          else
            CHANGES=""
          fi

          {
            echo "## MindOS Web Clipper v${VERSION}"
            echo ""
            echo "- One-click save any web page as clean Markdown"
            echo "- Hierarchical folder picker (browse nested directories)"
            echo "- Smart extraction via Mozilla Readability (strips ads/nav)"
            echo "- YAML frontmatter (title, source, author, site, date)"
            echo "- Dark mode (follows system)"
            echo '- Keyboard shortcut `Ctrl+Shift+M` / right-click menu'
            echo ""
            echo "<details><summary>Full feature list</summary>"
            echo ""
            echo "- Editable title before saving"
            echo "- Save to Inbox or any folder/subfolder"
            echo '- Source tracking (`web-clipper` tag in Inbox)'
            echo "- Code block preservation with language detection"
            echo "- Auth token setup (MindOS Settings → MCP)"
            echo "- 100% local — no cloud, no telemetry"
            echo ""
            echo "**Supported browsers**: Chrome 120+, Edge 120+, Brave, Arc"
            echo ""
            echo "</details>"
            echo ""
            echo "### Install"
            echo ""
            echo "1. Download \`mindos-web-clipper-${VERSION}.zip\` below"
            echo '2. Unzip → Chrome `chrome://extensions` → Developer mode → Load unpacked'
            if [ -n "$CHANGES" ]; then
              echo ""
              echo "<details><summary>Commits</summary>"
              echo ""
              echo '```'
              echo "$CHANGES"
              echo '```'
              echo "</details>"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          gh release create "${TAG}" \
            --title "MindOS Web Clipper v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            packages/browser-extension/mindos-web-clipper-${{ steps.version.outputs.version }}.zip
